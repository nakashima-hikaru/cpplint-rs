name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cross:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.runner == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cpplint-rs -> target"

      - name: Build release binary
        if: matrix.runner == 'ubuntu-latest'
        working-directory: cpplint-rs
        run: cross build --locked --release --target ${{ matrix.target }} -p cpplint-cli

      - name: Build release binary
        if: matrix.runner == 'windows-latest'
        working-directory: cpplint-rs
        run: cargo build --locked --release --target ${{ matrix.target }} -p cpplint-cli

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp cpplint-rs/target/${{ matrix.target }}/release/cpplint dist/
          tar -C dist -czf cpplint-${{ matrix.target }}.tar.gz cpplint

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item cpplint-rs/target/${{ matrix.target }}/release/cpplint.exe dist/cpplint.exe
          Compress-Archive -Path dist/cpplint.exe -DestinationPath cpplint-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpplint-${{ matrix.target }}
          path: cpplint-${{ matrix.target }}.*

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cpplint-rs -> target"

      - name: Build universal binaries
        working-directory: cpplint-rs
        run: |
          cargo build --locked --release --target x86_64-apple-darwin -p cpplint-cli
          cargo build --locked --release --target aarch64-apple-darwin -p cpplint-cli

      - name: Package universal tarball
        run: |
          mkdir -p dist
          lipo -create \
            cpplint-rs/target/x86_64-apple-darwin/release/cpplint \
            cpplint-rs/target/aarch64-apple-darwin/release/cpplint \
            -output dist/cpplint
          tar -C dist -czf cpplint-macos-universal.tar.gz cpplint

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpplint-macos-universal
          path: cpplint-macos-universal.tar.gz

  release:
    needs:
      - build-cross
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.*
